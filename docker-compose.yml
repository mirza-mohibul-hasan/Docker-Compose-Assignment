services:
  database:
    image: postgres:15
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: app_db

  backend:
    image: nginx:latest
    ports:
      - "8080:80"
    depends_on:
      - database

  frontend:
    image: nginx:latest
    ports:
      - "3001:80"
    depends_on:
      - backend
